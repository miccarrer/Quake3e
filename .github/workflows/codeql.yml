name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC — catches newly published CodeQL queries.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: analyze (c-cpp)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Install build deps
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev \
            libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          # security-and-quality is the broadest suite; drop to security-extended
          # if it gets too noisy on this legacy base.
          queries: security-and-quality

      - name: Build
        run: make -j"$(nproc)" USE_RENDERER_DLOPEN=0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
