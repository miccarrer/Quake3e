name: codeql

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', '*.txt', '.gitignore', 'docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', '*.txt', '.gitignore', 'docs/**']
  schedule:
    # Weekly, Monday 06:00 UTC — catches newly published CodeQL queries.
    # (also re-scans paths skipped on docs-only PRs/pushes)
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: analyze (c-cpp)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Install build deps
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev \
            libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev \
            libjpeg-dev libogg-dev libvorbis-dev

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: c-cpp
          # Query suite + vendored-code exclusions live in the config file.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        # Use system jpeg/ogg/vorbis so the vendored copies are NOT compiled:
        # CodeQL only analyzes what is built, and paths-ignore does not reliably
        # exclude compiled C. This keeps third-party libs out of the results.
        run: make -j"$(nproc)" USE_RENDERER_DLOPEN=0 USE_SYSTEM_JPEG=1 USE_SYSTEM_OGG=1 USE_SYSTEM_VORBIS=1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:c-cpp"
