// Client smoke test: runs in the headless client (null renderer, UI VM skipped).
// Exercises client-only subsystems that the dedicated server does not have.
// Install-free: no game assets required.

// the headless client config took effect
assert_cvar cl_renderer eq null
assert_cvar cl_noUI == 1

// client-only cvar round-trips through the engine
set cl_maxpackets 60
assert_cvar cl_maxpackets == 60

set cl_timeNudge 5
assert_cvar cl_timeNudge == 5

quit
