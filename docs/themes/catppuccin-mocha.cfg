// =============================================================================
//  UI theme: catppuccin-mocha  —  Catppuccin Mocha palette, Blue accent
//  Apply with:  theme catppuccin-mocha        (themelist to list, themesave to export)
//
//  This theme has two parts:
//   1. Console chrome  — pure cvars, work out of the box (no assets needed).
//   2. Menu re-skin    — remapShader lines that swap UrT's UI images for the
//      Catppuccin assets in theme/catppuccin/ ; needs scripts/catppuccin.shader
//      loaded (a vid_restart after first install). Engine-only: it re-skins
//      images, it cannot change menu layout/text (that lives in the game VM).
//
//  Palette: base #1e1e2e · mantle #181825 · surface0 #313244 · surface2 #585b70
//           text #cdd6f4 · subtext0 #a6adc8 · blue #89b4fa · green #a6e3a1
// =============================================================================

// --- 1. Console chrome (cvars) ----------------------------------------------
seta cl_conColor            "30 30 46 255"     // panel background        (base)
seta con_tabColor           "49 50 68 255"     // active console tab      (surface0)
seta con_tabColorInactive   "24 24 37 255"     // inactive console tab    (mantle)
seta con_accentColor        "137 180 250 255"  // separator + tab borders (blue)
seta con_titleColor         "137 180 250 255"  // active tab title text   (blue)
seta con_titleColorInactive "166 173 200 255"  // inactive tab title text (subtext0)
seta con_textColor          "205 214 244 255"  // body + prompt text      (text)
seta con_separatorHeight    "2"                // separator thickness (px)
seta con_opacity            "0.95"             // console background opacity
seta con_height             "0.5"              // console drop height (fraction)
seta con_tabScale           "1.25"             // tab-title font scale
seta con_scale              "1"                // console font scale
seta con_notifyLines        "4"                // notify lines over the game
seta con_notifyY            "0"                // notify vertical offset (px)
seta con_notifytime         "3"                // notify duration (s)
seta cl_conXOffset          "0"                // notify horizontal offset (px)
seta con_charset            "gfx/2d/bigchars"  // console font shader
seta con_image              "console"          // console background image

// --- 2. Menu re-skin (remapShader) ------------------------------------------
// Each line: replace UrT's <ui asset> with one of our shaders/images. The
// target shaders live in scripts/catppuccin.shader; their images in
// theme/catppuccin/. Comment any line to keep UrT's original for that element.

// Full-screen backdrop on every menu. UrT tints ut_menuback per screen, so we
// use fill_base (rgbGen identity) to get the SAME flat base colour everywhere.
remapShader ui/assets/ut_menuback theme/catppuccin/fill_base
remapShader ui/assets/backscreen  theme/catppuccin/fill_base

// In-game menu panels (player / team setup / weapons): semi-transparent base
// so the game still shows through. Swap "panel" for "fill_base" to make opaque.
remapShader ui/assets/ingame_bg3           theme/catppuccin/panel
remapShader ui/assets/ingame_bg_tr         theme/catppuccin/panel
remapShader ui/assets/ingame_bg_options_tr theme/catppuccin/panel
remapShader ui/assets/ingame_bg2_tr        theme/catppuccin/panel

// Diagonal hash lines: erased via the "hidden" shader (truly transparent) for a
// flatter background. The spinning arc (models/misc/circle_1) is intentionally
// left as UrT's original — keeping it out of the allowlist makes remapShader
// stricter (UI namespaces only). Needs the allowlist's ui_ prefix.
remapShader ui_lines1 theme/catppuccin/hidden
remapShader ui_lines2 theme/catppuccin/hidden

// Tabs / menu bands: unselected gray, selected blue (semi-transparent, with a
// thin gap baked into the texture). Used by the in-game dialog tabs.
remapShader ui/assets/tab_tr    theme/catppuccin/tab
remapShader ui/assets/tab_on_tr theme/catppuccin/tab_on

// Accent bar (selection/gradient highlight)
remapShader ui/assets/gradientbar2 theme/catppuccin/blue

// Panel folded corner (normal + hover)
remapShader ui/assets/angle    theme/catppuccin/angle
remapShader ui/assets/angle_on theme/catppuccin/angle_on

// Scrollbar: track, thumb, and the four arrow buttons
remapShader ui/assets/scrollbar             theme/catppuccin/scrollbar
remapShader ui/assets/scrollbar_thumb       theme/catppuccin/scrollbar_thumb
remapShader ui/assets/scrollbar_arrow_up_a  theme/catppuccin/arrow_up
remapShader ui/assets/scrollbar_arrow_dwn_a theme/catppuccin/arrow_dwn
remapShader ui/assets/scrollbar_arrow_left  theme/catppuccin/arrow_left
remapShader ui/assets/scrollbar_arrow_right theme/catppuccin/arrow_right

// Slider: track + knob
remapShader ui/assets/slider2      theme/catppuccin/slider
remapShader ui/assets/sliderbutt_1 theme/catppuccin/sliderbutt

// Navigation arrows: Back (gray / blue hover), Connect/Accept (green / lighter hover)
remapShader ui/assets/backarrow      theme/catppuccin/backarrow
remapShader ui/assets/backarrow_on   theme/catppuccin/backarrow_on
remapShader ui/assets/acceptarrow    theme/catppuccin/acceptarrow
remapShader ui/assets/acceptarrow_on theme/catppuccin/acceptarrow_on
